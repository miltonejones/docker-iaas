name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:

# Prevent concurrent deploys from racing on the EC2 instance.
# A new push cancels any in-progress deploy so the latest commit wins.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  build-images:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - name: console
            file: Dockerfile
          - name: consumer
            file: Dockerfile.consumer
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.file }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.image.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}-${{ matrix.image.name }}:latest
          cache-from: type=gha,scope=${{ matrix.image.name }}-v2
          cache-to: type=gha,scope=${{ matrix.image.name }}-v2,mode=max

  deploy:
    needs: [build-images]  # build-images already depends on verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd /home/ec2-user/docker-iaas
            # SSH runs a non-login shell — source .env so CONSUMER_API_KEY
            # is available for the issue-resolve PATCH below.
            set -a; source .env; set +a
            export IMAGE_TAG="${IMAGE_TAG:-${{ github.sha }}}"
            COMMIT_MSG=$(git log -1 --format=%s)
            # Container writes to data/ as root — fix ownership so git can
            # overwrite during reset.  (data/ is gitignored now; this is a
            # one-time transition for previously tracked previews.)
            sudo chown -R ec2-user:ec2-user data/ 2>/dev/null || true
            # Fetch and reset hard — the consumer may have local edits
            # that haven't been pushed yet. GitHub is the source of truth.
            git fetch origin main
            git reset --hard origin/main
            # Pull pre-built images from GHCR instead of building on EC2.
            docker compose pull console consumer
            docker compose up -d --remove-orphans console consumer caddy
            # Cleanup is best-effort only — stale images shouldn't block a deploy.
            docker image prune -f || true
            # Append success notification for the local notify-watcher
            mkdir -p scripts/issue-logs
            echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"level\":\"info\",\"summary\":\"✅ Deployed\",\"body\":\"$COMMIT_MSG\"}" >> scripts/issue-logs/notifications.jsonl || true
            # Mark the consumer issue as resolved now that the fix is live.
            ISSUE_ID=$(echo "$COMMIT_MSG" | sed -n 's/.*\(iss-[0-9]*-[a-z0-9]*\).*/\1/p') || true
            if [ -n "$ISSUE_ID" ]; then
              # Exchange the consumer key for a Bearer JWT.  The console
              # container may still be starting, so retry a few times.
              TOKEN=""
              for i in $(seq 1 5); do
                TOKEN=$(curl -sf -X POST http://localhost:4300/api/auth/consumer \
                  -H "x-consumer-api-key: $CONSUMER_API_KEY" | jq -r '.token // empty') || true
                [ -n "$TOKEN" ] && break || sleep 2
              done
              if [ -z "$TOKEN" ]; then
                echo "::warning::Could not obtain consumer JWT — skipping issue resolve for $ISSUE_ID"
              else
                for i in $(seq 1 10); do
                  curl -sf -X PATCH "http://localhost:4300/api/assistant/issues/$ISSUE_ID" \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer $TOKEN" \
                    -d '{"status":"resolved","resolution":"Deployed via CI","resolvedBy":"deploy"}' \
                    && break || sleep 2
                done
                # Verify it stuck.
                curl -sf "http://localhost:4300/api/assistant/issues/$ISSUE_ID" \
                  -H "Authorization: Bearer $TOKEN" \
                  | jq -e '.status == "resolved"' > /dev/null \
                  || echo "::warning::Failed to mark issue $ISSUE_ID as resolved"
              fi
            fi

      - name: Notify failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/docker-iaas
            COMMIT_MSG=$(git log -1 --format=%s)
            mkdir -p scripts/issue-logs
            echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"level\":\"error\",\"summary\":\"❌ Deploy failed\",\"body\":\"$COMMIT_MSG\"}" >> scripts/issue-logs/notifications.jsonl
