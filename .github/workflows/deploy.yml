name: Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:

# Prevent concurrent deploys from racing on the EC2 instance.
# A new push cancels any in-progress deploy so the latest commit wins.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  deploy:
    needs: verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Reject if protected files damaged
        run: |
          PROTECTED=(
            Dockerfile.consumer
            .gitignore
            docker-compose.yml
          )
          FAILED=false
          for f in "${PROTECTED[@]}"; do
            if ! git diff --quiet HEAD~1 HEAD -- "$f"; then
              echo "❌ PROTECTED FILE CHANGED: $f — recovering from previous commit"
              git checkout HEAD~1 -- "$f"
              FAILED=true
            fi
          done
          if $FAILED; then
            git config user.name "Dockyard Guard"
            git config user.email "guard@dockyard-ai.com"
            git add "${PROTECTED[@]}"
            git commit -m "fix: auto-recover protected files damaged by consumer" || true
            git push origin main
            echo "::warning::Protected files were damaged and auto-recovered. Deploy will continue with recovered files."
          else
            echo "✅ Protected files intact"
          fi

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/docker-iaas
            COMMIT_MSG=$(git log -1 --format=%s)
            # Fix permissions on data/ — container processes write as root
            # inside the container which maps to host UIDs that may not be
            # ec2-user, so git reset --hard can fail with Permission denied.
            sudo chown -R ec2-user:ec2-user data/ 2>/dev/null || true
            # Fetch and reset hard — the consumer may have local edits
            # that haven't been pushed yet. GitHub is the source of truth.
            git fetch origin main
            git reset --hard origin/main
            # Build and start console + caddy first (cached, no downtime).
            docker compose up --build -d --remove-orphans console caddy
            # Stop, rebuild, and restart the consumer with --no-cache.
            # Docker layer caching doesn't reliably detect Dockerfile-only changes.
            docker compose stop consumer 2>/dev/null || true
            docker compose build --no-cache consumer && docker compose up -d consumer || \
              docker compose up -d consumer
            # Cleanup is best-effort only — stale images shouldn't block a deploy.
            docker image prune -f || true
            # Append success notification for the local notify-watcher
            mkdir -p scripts/issue-logs
            echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"level\":\"info\",\"summary\":\"✅ Deployed\",\"body\":\"$COMMIT_MSG\"}" >> scripts/issue-logs/notifications.jsonl || true
            # Mark the consumer issue as resolved now that the fix is live.
            ISSUE_ID=$(echo "$COMMIT_MSG" | sed -n 's/.*\(iss-[0-9]*\).*/\1/p') || true
            if [ -n "$ISSUE_ID" ]; then
              curl -sf -X PATCH "http://localhost:4300/api/assistant/issues/$ISSUE_ID" \
                -H "Content-Type: application/json" \
                -H "x-consumer-api-key: $CONSUMER_API_KEY" \
                -d '{"status":"resolved","resolution":"Deployed via CI","resolvedBy":"deploy"}' \
                || echo "::warning::Failed to mark issue $ISSUE_ID as resolved"
            fi

      - name: Notify failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/docker-iaas
            COMMIT_MSG=$(git log -1 --format=%s)
            mkdir -p scripts/issue-logs
            echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"level\":\"error\",\"summary\":\"❌ Deploy failed\",\"body\":\"$COMMIT_MSG\"}" >> scripts/issue-logs/notifications.jsonl
