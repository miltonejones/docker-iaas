name: Deploy to EC2

on:
  push:
    branches: [main]

# Prevent concurrent deploys from racing on the EC2 instance.
# A new push cancels any in-progress deploy so the latest commit wins.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/docker-iaas
            COMMIT_MSG=$(git log -1 --format=%s)
            # Fetch and reset hard — the consumer may have local edits
            # that haven't been pushed yet. GitHub is the source of truth.
            git fetch origin main
            git reset --hard origin/main
            # Build and start console + caddy first (cached, no downtime).
            docker compose up --build -d --remove-orphans console caddy
            # Stop, rebuild, and restart the consumer with --no-cache.
            # Docker layer caching doesn't reliably detect Dockerfile-only changes.
            docker compose stop consumer 2>/dev/null || true
            docker compose build --no-cache consumer && docker compose up -d consumer || \
              docker compose up -d consumer
            # Cleanup is best-effort only — stale images shouldn't block a deploy.
            docker image prune -f || true
            # Append success notification for the local notify-watcher
            mkdir -p scripts/issue-logs
            echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"level\":\"info\",\"summary\":\"✅ Deployed\",\"body\":\"$COMMIT_MSG\"}" >> scripts/issue-logs/notifications.jsonl || true

      - name: Notify failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/docker-iaas
            COMMIT_MSG=$(git log -1 --format=%s)
            mkdir -p scripts/issue-logs
            echo "{\"ts\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"level\":\"error\",\"summary\":\"❌ Deploy failed\",\"body\":\"$COMMIT_MSG\"}" >> scripts/issue-logs/notifications.jsonl
