services:
  console:
    build: .
    image: ghcr.io/miltonejones/docker-iaas-console:${IMAGE_TAG:-latest}
    container_name: dockyard
    ports:
      - '127.0.0.1:4300:4300'
    environment:
      # Where to read host disk usage from. When running the console inside a
      # container, mount the host root read-only (below) and point here.
      HOST_DISK_PATH: /host
      USAGE_POLL_MS: '5000'
      HOST_COMMAND_PRESETS: "${HOST_COMMAND_PRESETS:-[]}"
      HOST_BUILD_HELPER_SOCKET: /app/data/host-build-helper.sock
      ASSISTANT_PROVIDER: "${ASSISTANT_PROVIDER:-anthropic}"
      DEEPSEEK_MODEL: "${DEEPSEEK_MODEL:-deepseek-v4-pro}"
      DEEPSEEK_TITLE_MODEL: "${DEEPSEEK_TITLE_MODEL:-deepseek-v4-flash}"
      ISSUE_WEBHOOK_URL: "${ISSUE_WEBHOOK_URL:-}"
      # Pre-shared key that lets the issue consumer obtain a JWT without
      # needing direct SQLite DB access.  Must match CONSUMER_API_KEY on
      # the consumer side.
      CONSUMER_API_KEY: "${CONSUMER_API_KEY:-}"
    labels:
      iaas.system: 'true'
    volumes:
      # Manage the host's Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Report the host's real disk usage rather than the container's overlay.
      - /:/host:ro
      # Persist the SQLite database (gateway routes, functions, settings).
      - ./data:/app/data
      # Expose the consumer's notification log (see scripts/issue-consumer.mjs)
      # so server/src/routes/notifications.ts can read/tail it and the POST
      # endpoint can append new entries from containerized consumers.
      - ./scripts/issue-logs:/app/scripts/issue-logs
    secrets:
      # Mounted read-only at /run/secrets/anthropic_api_key inside the
      # container — never exposed via `docker inspect`/env, unlike a plain
      # `environment:` entry. Powers the "Ask Dockyard" assistant.
      - anthropic_api_key
      # Encrypts saved MySQL/MongoDB credentials at rest in Dockyard's SQLite
      # database. Keep this stable; changing it prevents decrypting existing
      # saved connections.
      - dockyard_database_master_key
      # A GitHub personal access token, used by the assistant's GitHub tools
      # to read private repos and to clone/commit/push. Optional — public-repo
      # reads work without it, but private repos and any commit/push require it.
      - github_token
      # Optional DeepSeek API key. Set ASSISTANT_PROVIDER=deepseek to use
      # DeepSeek's Anthropic-compatible API instead of Anthropic.
      - deepseek_api_key
    restart: unless-stopped
    networks:
      # Shares dockyard-net with the containers/functions it manages (including
      # the persistent MinIO instance), so it can reach them by name.
      - dockyard-net

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    image: ghcr.io/miltonejones/docker-iaas-consumer:${IMAGE_TAG:-latest}
    container_name: dockyard-consumer-ctr
    command: ["node", "scripts/issue-consumer.mjs"]
    labels:
      iaas.protected: "true"
      iaas.description: "Dockyard issue consumer — Claude Code + DeepSeek v4-pro. Polls API directly, auto-fixes, pushes to GitHub. Managed by docker-compose."
    environment:
      DOCKYARD_API: http://console:4300
      DEEPSEEK_CMD: /usr/local/bin/claude
      JWT_SECRET: "${JWT_SECRET:-dockyard-dev-secret-change-in-production}"
      ANTHROPIC_AUTH_TOKEN: "${ANTHROPIC_AUTH_TOKEN:-}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GIT_AUTHOR_NAME: "Dockyard AI"
      GIT_AUTHOR_EMAIL: "dockyard@miltonejones.dev"
      GIT_COMMITTER_NAME: "Dockyard AI"
      GIT_COMMITTER_EMAIL: "dockyard@miltonejones.dev"
    # Match host UID so mounted volumes (issue-logs, .git, data) are writable.
    user: "1000:1000"
    volumes:
      - ./data:/app/data:ro
      - ./scripts/issue-logs:/app/scripts/issue-logs
      # Mount the git repo so the consumer can commit and push fixes.
      - ./.git:/app/.git:rw
    depends_on:
      - console
    restart: unless-stopped
    networks:
      - dockyard-net

  caddy:
    image: caddy:2-alpine
    container_name: dockyard-caddy
    labels:
      iaas.system: 'true'
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - console
    restart: unless-stopped
    networks:
      - dockyard-net

networks:
  dockyard-net:
    # Fixed name (not project-prefixed) — must match the network Dockyard's
    # own server creates/looks up at runtime via the Docker API.
    name: dockyard-net
    driver: bridge

volumes:
  caddy_data:
  caddy_config:

secrets:
  anthropic_api_key:
    # This host's Anthropic API key lives outside the repo at ~/.antro.
    # Override with ANTHROPIC_KEY_FILE if you keep it somewhere else.
    file: ${ANTHROPIC_KEY_FILE:-/home/miltonejones/.antro}
  dockyard_database_master_key:
    # Generated locally outside the repository. Override if your secrets are
    # managed elsewhere.
    file: ${DOCKYARD_DATABASE_MASTER_KEY_FILE:-/home/miltonejones/.dockyard_database_master_key}
  github_token:
    # A GitHub personal access token (repo scope for private repos / push).
    # This host's token lives outside the repo at ~/.github_token — an empty
    # file is fine (public-repo reads work with no token; private repos and
    # commit/push report a clear "not configured" error until a real token is
    # added). Override with GITHUB_TOKEN_FILE if you keep it somewhere else.
    file: ${GITHUB_TOKEN_FILE:-/home/miltonejones/.github_token}
  deepseek_api_key:
    # Keep the key outside the repository. On EC2, set DEEPSEEK_API_KEY_FILE in
    # .env to the EC2 user's owner-only key file before switching providers.
    file: ${DEEPSEEK_API_KEY_FILE:-/dev/null}
