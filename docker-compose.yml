services:
  console:
    build: .
    container_name: dockyard
    ports:
      - '4300:4300'
    environment:
      # Where to read host disk usage from. When running the console inside a
      # container, mount the host root read-only (below) and point here.
      HOST_DISK_PATH: /host
      USAGE_POLL_MS: '5000'
    labels:
      iaas.system: 'true'
    volumes:
      # Manage the host's Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Report the host's real disk usage rather than the container's overlay.
      - /:/host:ro
      # Persist the SQLite database (gateway routes, functions, settings).
      - ./data:/app/data
    restart: unless-stopped
    networks:
      # Shares dockyard-net with the containers/functions it manages (including
      # the persistent MinIO instance), so it can reach them by name.
      - dockyard-net

networks:
  dockyard-net:
    # Fixed name (not project-prefixed) — must match the network Dockyard's
    # own server creates/looks up at runtime via the Docker API.
    name: dockyard-net
    driver: bridge
